name: Security & Accessibility Quality Gates

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  audit:
    name: Run Quality & Security Audits
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run Accessibility (a11y) Check
        run: node scripts/a11y_check.js

      - name: Run Security & Pentest Check
        run: node scripts/security_check.js
