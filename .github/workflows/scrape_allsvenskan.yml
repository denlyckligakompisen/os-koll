name: Daily Allsvenskan Update
on:
  schedule:
    - cron: '0 5 * * *' # Run at 05:00 UTC daily
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Scrape Allsvenskan Data
        run: |
          npm run scrape:allsvenskan
          npm run scrape:allsvenskan-logos
          npm run scrape:allsvenskan-table
          npm run scrape:allsvenskan-maraton
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/allsvenskan_matches.json public/data/allsvenskan_logos.json
          git commit -m "Update Allsvenskan match data [skip ci]" || exit 0
          git push
