name: Daily Allsvenskan Update
on:
  schedule:
    - cron: '0 5 * * *'    # Daily at 05:00 UTC
    - cron: '0 20 * * *'   # Extra run at 20:00 UTC (after evening matches)
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install

      # ── SofaScore API: matches + table (fast, no browser/key needed) ──
      - name: Fetch Allsvenskan Data (SofaScore)
        run: npm run fetch:allsvenskan

      # ── Playwright: maraton table + logos (still scraped from allsvenskan.se) ──
      - name: Install Playwright for remaining scrapers
        run: npx playwright install --with-deps chromium
      - name: Scrape Maratontabell and Logos
        run: |
          npm run scrape:allsvenskan-maraton
          npm run scrape:allsvenskan-logos

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/allsvenskan_matches.json public/data/allsvenskan_table.json public/data/allsvenskan_logos.json public/data/allsvenskan_maraton.json
          git commit -m "Update Allsvenskan data [skip ci]" || exit 0
          git push
