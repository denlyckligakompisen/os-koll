name: Daily Allsvenskan Update
on:
  schedule:
    - cron: '0 2 * * *'     # Daily at 04:00 Swedish time
  workflow_dispatch:

env:
  TZ: Europe/Stockholm

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # 🤖 Allsvenskan.se Scrapers 🤖
      - name: Fetch Allsvenskan Matches (allsvenskan.se)
        run: npm run scrape:allsvenskan -- --yesterday-only
        
      - name: Fetch Allsvenskan Table (allsvenskan.se)
        run: npm run scrape:allsvenskan-table

      - name: Fetch Allsvenskan Squads (Transfermarkt)
        run: node scripts/scrape_squads.js

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/allsvenskan_matches.json public/data/allsvenskan_table.json public/data/allsvenskan_squads.json public/data/exchange_rate.json
          git commit -m "Update Allsvenskan data from allsvenskan.se and TM [skip ci]" || exit 0
          git push
