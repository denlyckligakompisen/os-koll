name: Hourly Allsvenskan Update
on:
  schedule:
    - cron: '0 * * * *'     # Every hour on the hour
  workflow_dispatch:

jobs:
  update-delta:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Fetch Allsvenskan Delta Data (SofaScore)
        run: npm run fetch:allsvenskan-delta

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/allsvenskan_matches.json public/data/allsvenskan_table.json
          git commit -m "Update Allsvenskan delta data [skip ci]" || exit 0
          git push
